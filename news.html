<style>
:root{
  --green:#183f21;--green-2:#24592f;--green-3:#1d4a3b;
  --gold:#c6a437;--gold-2:#d6b95a;--gold-3:#e0c783;
  --rice:#f7f1e3;--rice-2:#fbf8ef;
  --white:#fff;--ink:#202020;--muted:#61716b;--line:#e6ddc9;
  --shadow:0 18px 40px rgba(20,45,24,.09);
  --font:'Noto Sans TC','Microsoft JhengHei','PingFang TC',Arial,sans-serif;
  --serif:'Noto Serif TC','Noto Sans TC','Microsoft JhengHei',serif;
  --max:1240px;
}
/* PAGE HERO */
.page-hero{background:linear-gradient(120deg,var(--green) 0%,var(--green-3) 100%);padding:64px 0 52px;color:#fff;position:relative;overflow:hidden}
.page-hero::after{content:'';position:absolute;right:-120px;top:-120px;width:480px;height:480px;border-radius:50%;background:rgba(198,164,55,.08);pointer-events:none}
.page-hero-eyebrow{font-size:.72rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-3);margin-bottom:12px}
.page-hero h1{font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);font-weight:900;margin-bottom:14px;line-height:1.15}
.page-hero p{font-size:1rem;opacity:.8;max-width:620px;line-height:1.8}
/* SECTIONS */
.section{padding:64px 0}
.section-alt{background:var(--white)}
.section-rice{background:var(--rice)}
.sec-head{margin-bottom:40px}
.sec-label{font-size:.72rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.sec-head h2{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:900;color:var(--green);line-height:1.15;margin-bottom:10px}
.sec-head p{font-size:1rem;color:var(--muted);max-width:680px;line-height:1.8}
.sec-divider{width:48px;height:3px;background:var(--gold);border-radius:2px;margin-top:14px}
/* FEATURED NEWS */
.news-featured{display:grid;grid-template-columns:1.2fr 1fr;gap:32px;margin-bottom:48px}
.news-feat-card{border-radius:22px;overflow:hidden;box-shadow:var(--shadow);background:var(--white);border:1px solid var(--line)}
.news-feat-img{height:280px;overflow:hidden;position:relative}
.news-feat-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.news-feat-card:hover .news-feat-img img{transform:scale(1.04)}
.news-tag{position:absolute;top:14px;left:14px;background:var(--gold);color:var(--green);font-size:.66rem;font-weight:800;padding:4px 12px;border-radius:20px;letter-spacing:.04em}
.news-feat-body{padding:24px}
.news-date{font-size:.74rem;color:var(--muted);margin-bottom:8px}
.news-feat-body h2{font-family:var(--serif);font-size:1.2rem;font-weight:900;color:var(--green);line-height:1.4;margin-bottom:10px}
.news-feat-body p{font-size:.86rem;color:var(--muted);line-height:1.7}
/* NEWS LIST */
.news-list{display:grid;gap:24px}
.news-list-card{background:var(--white);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:grid;grid-template-columns:260px 1fr;box-shadow:0 4px 16px rgba(20,45,24,.06);transition:box-shadow .2s,transform .2s}
.news-list-card:hover{box-shadow:0 14px 36px rgba(20,45,24,.12);transform:translateY(-2px)}
.news-list-img{height:180px;overflow:hidden;position:relative}
.news-list-img img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.news-list-card:hover .news-list-img img{transform:scale(1.05)}
.news-list-body{padding:22px 24px;display:flex;flex-direction:column;justify-content:center}
.news-list-body h3{font-family:var(--serif);font-size:1.05rem;font-weight:800;color:var(--green);line-height:1.4;margin-bottom:8px}
.news-list-body p{font-size:.84rem;color:var(--muted);line-height:1.65}
.news-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.news-badge{display:inline-block;font-size:.64rem;font-weight:800;padding:3px 10px;border-radius:20px;background:rgba(198,164,55,.15);color:var(--green);letter-spacing:.04em}
/* ANNOUNCE LIST */
.announce-list{display:grid;gap:12px}
.announce-item{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;transition:box-shadow .18s}
.announce-item:hover{box-shadow:0 8px 24px rgba(20,45,24,.09)}
.announce-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0}
.announce-date{font-size:.72rem;color:var(--muted);flex-shrink:0;width:90px}
.announce-title{font-size:.9rem;font-weight:700;color:var(--green)}
.announce-tag{font-size:.64rem;font-weight:700;padding:2px 8px;border-radius:20px;background:#f4ede0;color:#7b5800;margin-left:auto;flex-shrink:0;white-space:nowrap}
/* RWD */
@media(max-width:900px){
  .news-featured{grid-template-columns:1fr}
  .news-list-card{grid-template-columns:1fr}
  .news-list-img{height:220px}
}
@media(max-width:580px){
  .section{padding:44px 0}
  .news-feat-img{height:200px}
  .announce-date{display:none}
}

/* ACTIVITY GALLERY (dynamic) */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.activity-card{background:var(--white,#fff);border:1px solid var(--line,#e6ddc9);border-radius:22px;overflow:hidden;box-shadow:0 14px 36px rgba(20,45,24,.07)}
.activity-cover{aspect-ratio:16/10;background:#f7f1e3;margin:0}
.activity-cover img{width:100%;height:100%;object-fit:cover;display:block}
.activity-card-body{padding:22px}
.activity-card-body .tag{display:inline-flex;background:#f7f1e3;color:#7d6316;border-radius:999px;padding:5px 12px;font-size:13px;font-weight:900;margin-bottom:10px}
.activity-card-body h3{color:#183f21;font-size:1.05rem;font-weight:800;margin-bottom:6px}
.activity-card-body p{color:#666;line-height:1.8;font-size:.84rem}
.activity-card-body time{display:block;font-size:.76rem;color:#999;margin-bottom:8px}
.activity-photo-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 22px 22px}
.activity-photo-strip figure{margin:0;border-radius:14px;overflow:hidden;aspect-ratio:4/3;background:#f7f1e3}
.activity-photo-strip img{width:100%;height:100%;object-fit:cover;display:block}
.drive-photo-panel{padding:0 22px 22px}
.drive-photo-panel iframe{width:100%;height:380px;border:1px solid #e6ddc9;border-radius:16px;background:#fff}
.activity-photo-note{margin:0 22px 22px;color:#666;font-size:14px}
@media(max-width:900px){.gallery-grid{grid-template-columns:1fr 1fr}}
@media(max-width:580px){.gallery-grid{grid-template-columns:1fr}.activity-photo-strip{grid-template-columns:repeat(2,1fr)}}
</style>
