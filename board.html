/* ── 理監事名片卡片設計 ── */
/* Group section */
.nc-group { margin-bottom: 60px; }
.nc-group:last-child { margin-bottom: 0; }
.nc-group-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 14px;
  border-bottom: 1.5px solid rgba(198,164,55,.3);
}
.nc-group-label {
  font-family: var(--serif,'Noto Serif TC',serif);
  font-size: 1.05rem; font-weight: 800; color: #fff;
  padding: 8px 24px; border-radius: 20px;
  background: #183f21;
  border: 1.5px solid rgba(198,164,55,.5);
  white-space: nowrap;
  letter-spacing: .04em;
  box-shadow: 0 3px 10px rgba(20,45,24,.18);
}
/* Card grid: 3 cols desktop / 2 tablet / 1 mobile */
.nc-grid-solo {
  display: flex;
  justify-content: center;   /* 理事長卡片置中 */
  margin-bottom: 20px;
}
.nc-grid-solo .nc-card {
  width: 50%;                /* 與其他卡片等寬（2欄時各50%）*/
  max-width: 100%;
}
.nc-grid + .nc-grid { margin-top: 20px; }
.nc-grid-solo + .nc-grid { margin-top: 0; }
.nc-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
/* Name card: horizontal layout */
.nc-card {
  display: flex;
  flex-direction: row;
  background: #fdfbf4;
  border: 1.5px solid rgba(198,164,55,.45);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(20,45,24,.07), inset 0 1px 0 rgba(255,255,255,.8);
  transition: box-shadow .22s, transform .22s;
  /* Locked height - shows upper body */
  height: 260px;
  max-height: 260px;
}
.nc-card:hover { box-shadow: 0 12px 36px rgba(20,45,24,.14); transform: translateY(-3px); }
/* Photo area */
.nc-photo {
  width: 42%;
  height: 100%;           /* Fill fixed card height */
  flex-shrink: 0;
  position: relative;
  background: #f0ece0;
  overflow: hidden;
}
.nc-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top; /* prevent head cropping */
  display: block;
}
/* Green diagonal corner accent */
/* nc-photo::after removed - no green corner */
/* Initial character for no-photo */
.nc-initial {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif,'Noto Serif TC',serif);
  font-size: clamp(48px, 7vw, 80px);
  font-weight: 900;
  color: #183f21;
  background: linear-gradient(145deg, #f7f1e3, #ede5cb);
  position: relative; z-index: 1;
}
/* Info area */
.nc-info {
  flex: 1;
  min-width: 0;              /* Prevent flex overflow */
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 12px;
  padding: 16px 20px;
  overflow: hidden;
}
/* Role box: pill shape */
.nc-role {
  display: inline-flex; align-items: center;
  align-self: flex-start;
  border: 1.5px solid #183f21;
  border-radius: 999px;
  padding: 4px 12px;
  font-size: clamp(13px, 1.2vw, 16px);
  font-weight: 700;
  color: #fff;
  text-align: left;
  white-space: nowrap;
  background: #183f21;
  white-space: nowrap;
  overflow: hidden;
}
.nc-role-long { font-size: clamp(12px, 1.1vw, 14px); white-space: nowrap; }
/* Name box */
.nc-name {
  display: inline-flex; align-items: center;
  align-self: flex-start;
  border: 1.5px solid rgba(198,164,55,.5);
  border-radius: 8px;
  padding: 6px 16px;
  font-family: var(--serif,'Noto Serif TC',serif);
  font-size: clamp(28px, 4vw, 46px);
  font-weight: 900;
  color: #183f21;
  text-align: left;
  letter-spacing: .18em;
  line-height: 1.1;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
/* Company box */
.nc-company {
  display: inline-flex; align-items: center;
  align-self: flex-start;
  border: 1px solid rgba(198,164,55,.4);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: clamp(12px, 1.3vw, 16px);
  color: #526055;
  text-align: left;
  line-height: 1.4;
  max-width: 100%;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
/* RWD */
@media(max-width:900px){
  .nc-name{font-size:clamp(28px,5vw,44px);}
  .nc-role{font-size:clamp(15px,2vw,21px);}
  .nc-role-long{font-size:clamp(13px,1.8vw,18px);}
  .nc-company{font-size:clamp(12px,1.8vw,17px);}
  .nc-initial{font-size:clamp(40px,6vw,64px);}
}
@media(max-width:680px){
  .nc-grid{grid-template-columns:1fr;}
  .nc-card{height:200px;max-height:200px;}
  .nc-name{font-size:clamp(28px,8vw,44px);}
  .nc-role{font-size:clamp(15px,3.5vw,20px);}
  .nc-role-long{font-size:clamp(13px,3vw,17px);}
  .nc-company{font-size:clamp(12px,3vw,17px);}
  .nc-initial{font-size:clamp(36px,10vw,56px);}

.nc-grid-solo{display:block;}  /* 手機版：不用flex，自然全寬 */
.nc-grid-solo .nc-card{width:100%;}}
