<script>
/* Auto-update roster from admin when guild-data-static.js has board data with photos */
(function(){
  var BASE = 'https://ccazhu-coder.github.io/changhwa-rice-guild/';
  function tryUpdateRoster() {
    if (!window.GUILD_STATIC_DATA || !window.GUILD_STATIC_DATA.board) return;
    var members = window.GUILD_STATIC_DATA.board.members || [];
    // Only update if any member has a photo (indicating admin has made changes)
    var hasPhotos = members.some(function(m){ return m.photo; });
    if (!hasPhotos) return; // Keep static content if no photos set
    // Admin has updated data with photos - show dynamic version
    var roleOrder = ['理事長','副理事長','常務理事','理事','常務監事','監事','名譽理事長','顧問','候補理事','候補監事'];
    var groups = { '理事會':[], '監事會':[], '顧問與候補':[] };
    var roleGroup = {'理事長':'理事會','副理事長':'理事會','常務理事':'理事會','理事':'理事會','常務監事':'監事會','監事':'監事會','名譽理事長':'顧問與候補','顧問':'顧問與候補','候補理事':'顧問與候補','候補監事':'顧問與候補'};
    members.forEach(function(m){ var g=roleGroup[m.role]||'顧問與候補'; groups[g].push(m); });
    function makeGrid(mems) {
      return '<div class="roster-photo-grid">' + mems.sort(function(a,b){ return (roleOrder.indexOf(a.role)||99)-(roleOrder.indexOf(b.role)||99); }).map(function(m){
        var photo = m.photo ? '<img class="roster-photo" src="'+BASE+m.photo.replace('./','')+'" alt="'+m.name+'" onerror="this.outerHTML='<div class=roster-photo-placeholder>👤</div>'">' : '<div class="roster-photo-placeholder">👤</div>';
        return '<div class="roster-photo-card">'+photo+'<div class="roster-photo-role">'+m.role+'</div><div class="roster-photo-name">'+m.name+'</div>'+(m.company?'<div class="roster-photo-company">'+m.company+'</div>':'')+'</div>';
      }).join('') + '</div>';
    }
    var targets = {directors:groups['理事會'], supervisors:groups['監事會'], advisors:groups['顧問與候補']};
    var ids = {directors:'rosterDirectors', supervisors:'rosterSupervisors', advisors:'rosterAdvisors'};
    Object.keys(targets).forEach(function(k){
      var el = document.getElementById(ids[k]);
      if (el && targets[k].length) el.outerHTML = makeGrid(targets[k]);
    });
  }
  if (window.GUILD_STATIC_DATA) { tryUpdateRoster(); }
  else { var t = setInterval(function(){ if(window.GUILD_STATIC_DATA){ clearInterval(t); tryUpdateRoster(); } },300); }
})();
</script>

<script>
(function(){
  var BASE = 'https://ccazhu-coder.github.io/changhwa-rice-guild/';
  var ROLE_ORDER = ['理事長','副理事長','常務理事','理事','常務監事','監事','名譽理事長','顧問','候補理事','候補監事'];
  var ROLE_GROUP = {
    '理事長':'理事會','副理事長':'理事會','常務理事':'理事會','理事':'理事會',
    '常務監事':'監事會','監事':'監事會',
    '名譽理事長':'顧問與候補','顧問':'顧問與候補','候補理事':'顧問與候補','候補監事':'顧問與候補'
  };

  function renderRoster(members) {
    var groups = {};
    members.forEach(function(m){
      var g = ROLE_GROUP[m.role] || '其他';
      if (!groups[g]) groups[g] = [];
      groups[g].push(m);
    });

    var containers = {
      '理事會': document.getElementById('rosterDirectors'),
      '監事會': document.getElementById('rosterSupervisors'),
      '顧問與候補': document.getElementById('rosterAdvisors')
    };

    Object.keys(containers).forEach(function(groupName){
      var el = containers[groupName];
      if (!el) return;
      var mems = (groups[groupName] || []).sort(function(a,b){
        return (ROLE_ORDER.indexOf(a.role)||99) - (ROLE_ORDER.indexOf(b.role)||99);
      });
      el.innerHTML = mems.map(function(m){
        var photoHtml = m.photo
          ? '<img class="roster-photo" src="' + BASE + m.photo.replace('./','') + '" alt="' + m.name + '" onerror="this.outerHTML='<div class=roster-photo-placeholder>👤</div>'">'
          : '<div class="roster-photo-placeholder">👤</div>';
        return '<div class="roster-photo-card">'
          + photoHtml
          + '<div class="roster-photo-role">' + m.role + '</div>'
          + '<div class="roster-photo-name">' + m.name + '</div>'
          + (m.company ? '<div class="roster-photo-company">' + m.company + '</div>' : '')
          + '</div>';
      }).join('');
    });
  }

  function init(){
    if (!window.GUILD_STATIC_DATA || !window.GUILD_STATIC_DATA.board) return;
    renderRoster(window.GUILD_STATIC_DATA.board.members || []);
  }
  if (window.GUILD_STATIC_DATA) { init(); }
  else { var t = setInterval(function(){ if(window.GUILD_STATIC_DATA){ clearInterval(t); init(); } }, 200); }
})();
</script>
